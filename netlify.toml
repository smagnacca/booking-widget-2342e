[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "public"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[dev]
  command = "netlify functions:serve"
  port = 8888

[[headers]]
  for = "/widget.js"
  [headers.values]
    "Content-Type" = "application/javascript; charset=utf-8"
    "Access-Control-Allow-Origin" = "*"
    "Cache-Control" = "public, max-age=3600"

[[headers]]
  for = "/widget.css"
  [headers.values]
    "Content-Type" = "text/css; charset=utf-8"
    "Access-Control-Allow-Origin" = "*"
    "Cache-Control" = "public, max-age=3600"

# Non-sensitive defaults only — credentials are set via Netlify UI env vars
[env]
  GOOGLE_CALENDAR_ID = "scott.magnacca1@gmail.com"
  CALENDAR_TIMEZONE = "America/New_York"
  CONFIRMATION_EMAIL_FROM = "bookings@book.scottmagnacca.com"
  WIDGET_HOST = "https://book.scottmagnacca.com"
  MAX_ADVANCE_DAYS = "30"
  BOOKING_BUFFER_MINUTES = "15"
